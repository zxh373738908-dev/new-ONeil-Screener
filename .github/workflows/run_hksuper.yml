name: HKsuper-Share Screener

on:
  schedule:
    # 每天 UTC 04:19 运行 (北京时间 12:19)
    - cron: '19 4 * * 1-5'
    # 每天下午 3:16 (北京/香港时间) -> UTC 07:16
    - cron: '16 7 * * 1-5'
    # 每天下午 4:26 (北京/香港时间) -> UTC 08:26
    - cron: '26 8 * * 1-5'
  workflow_dispatch:

jobs:
  run-hksuper-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy gspread google-auth yfinance requests scipy gspread-formatting

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
    
      - name: Run HKsuper-Share Screener
        # 假设你的港股运行脚本名为 run_hksuper.py
        run: python run_hksuper.py
