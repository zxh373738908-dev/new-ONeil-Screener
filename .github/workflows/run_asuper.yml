name: Asuper-Share Screener Pro

on:
  schedule:
   
    # 你的日常更新时间
    - cron: '49 3 * * 1-5'
    - cron: '16 6 * * 1-5'
    - cron: '16 7 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install pandas numpy yfinance requests gspread gspread-formatting

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Python Script
        run: python run_asuper.py
