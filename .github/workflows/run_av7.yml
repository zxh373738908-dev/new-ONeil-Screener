name: AV7-Share Screener

on:
  schedule:
    # 每天 UTC 04:19 运行 (北京时间 12:19)
    - cron: '19 4 * * 1-5'
    # 每天 UTC 06:16 运行 (北京时间 14:16)
    - cron: '16 6 * * 1-5'
    # 每天 UTC 07:16 运行 (北京时间 15:16)
    - cron: '16 7 * * 1-6'
  workflow_dispatch:

# 消除 Node.js 20 老化警告的关键配置！👇
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-a-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install pandas numpy yfinance requests gspread gspread-formatting

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Av7-Share Screener
        run: python run_av7.py
