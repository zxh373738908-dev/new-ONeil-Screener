name: A-Share Screener Pro

on:
  schedule:
    # 临时测试：设定为你现在时间的 10 分钟后运行！
    # （比如现在是 18:00，就设为 UTC 10:10 -> '10 10 * * *'）
    - cron: '17 3 * * *'  
    # 你的日常更新时间
    - cron: '19 4 * * 1-5'
    - cron: '16 6 * * 1-5'
    - cron: '16 7 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install pandas numpy yfinance requests gspread gspread-formatting

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Python Script
        run: python run_a.py
