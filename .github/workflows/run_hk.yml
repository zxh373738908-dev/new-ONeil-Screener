name: HK-Share Screener

on:
  workflow_dispatch:

jobs:
  run-hk-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy gspread google-auth yfinance requests scipy gspread-formatting

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
    
      - name: Run HK-Share Screener
        # 假设你的港股运行脚本名为 run_hk.py
        run: python run_hk.py
